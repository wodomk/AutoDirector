<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebDirector</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #121212;
      --line: #1f1f1f;
      --accent: #00ff88;
      --text: #f2f2f2;
      --muted: #9a9a9a;
      --danger: #ff5757;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(1200px 800px at 80% -10%, #103425 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 16px; color: var(--accent); }
    .grid { display: grid; gap: 16px; grid-template-columns: 1fr; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
    textarea, select, button, input[type="range"] { width: 100%; }
    textarea {
      min-height: 140px; resize: vertical; background: #0f0f0f; color: var(--text);
      border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px;
    }
    .row { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 8px; }
    select {
      background: #0f0f0f; color: var(--text); border: 1px solid #2a2a2a;
      border-radius: 10px; padding: 10px;
    }
    button {
      margin-top: 14px; background: var(--accent); color: #00140a; border: none;
      border-radius: 12px; padding: 12px 16px; font-weight: 700; cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .stages { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .stage {
      border: 1px solid #2a2a2a; border-radius: 10px; padding: 10px; text-align: center; color: var(--muted);
    }
    .stage.active { border-color: var(--accent); color: var(--accent); }
    .progress {
      width: 100%; height: 12px; background: #1a1a1a; border-radius: 99px; overflow: hidden; margin: 10px 0;
    }
    .bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00aa5a, var(--accent)); transition: width .3s; }
    .cards { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }
    .shot, .thumb { background: #0f0f0f; border: 1px solid #212121; border-radius: 10px; padding: 10px; }
    .thumb img { width: 100%; display: block; border-radius: 8px; }
    .muted { color: var(--muted); }
    .error { color: var(--danger); font-weight: 700; }
    video { width: 100%; border-radius: 12px; border: 1px solid #202020; background: #000; }
    a.download {
      display: inline-block; margin-top: 10px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent);
      border-radius: 8px; padding: 8px 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>WebDirector</h1>
    <div class="grid">
      <section class="card">
        <label for="prompt">Opisz scene...</label>
        <textarea id="prompt" placeholder="Np. Bohater idzie przez neonowe miasto podczas deszczu..."></textarea>
        <div class="row">
          <div>
            <label for="duration">Duration: <span id="durationVal">10s</span></label>
            <input id="duration" type="range" min="0" max="3" value="0" />
            <div id="durationInfo" class="muted">Klatek kluczowych: 11 | Szacowany czas: 180 minut</div>
          </div>
          <div>
            <label for="steps">Steps: <span id="stepsVal">20</span></label>
            <input id="steps" type="range" min="10" max="30" value="20" />
          </div>
          <div>
            <label for="res">Rozdzielczosc</label>
            <select id="res">
              <option value="640x480">640x480</option>
              <option value="832x480" selected>832x480</option>
              <option value="1280x720">1280x720</option>
            </select>
          </div>
        </div>
        <button id="runBtn">Generuj film</button>
      </section>

      <section class="card">
        <div class="stages">
          <div class="stage" id="s-scenario">S scenariusz</div>
          <div class="stage" id="s-frames">F klatki</div>
          <div class="stage" id="s-video">V klipy</div>
          <div class="stage" id="s-assembly">A skladanie</div>
        </div>
        <div class="progress"><div class="bar" id="bar"></div></div>
        <div id="statusText" class="muted">Czeka na start...</div>
        <div id="oom" class="error" style="display:none; margin-top:8px;">OOM: zmniejsz frames lub rozdzielczosc</div>
      </section>

      <section class="card">
        <h3>Shot List</h3>
        <div class="cards" id="shots"></div>
      </section>

      <section class="card">
        <h3>Klatki kluczowe</h3>
        <div class="cards" id="thumbs"></div>
      </section>

      <section class="card">
        <h3>Finalny film</h3>
        <video id="player" controls style="display:none;"></video>
        <a id="download" class="download" style="display:none;" download>Pobierz MP4</a>
      </section>
    </div>
  </div>

  <script>
    const promptEl = document.getElementById('prompt');
    const durationEl = document.getElementById('duration');
    const stepsEl = document.getElementById('steps');
    const durationVal = document.getElementById('durationVal');
    const durationInfo = document.getElementById('durationInfo');
    const stepsVal = document.getElementById('stepsVal');
    const resEl = document.getElementById('res');
    const runBtn = document.getElementById('runBtn');
    const bar = document.getElementById('bar');
    const statusText = document.getElementById('statusText');
    const shots = document.getElementById('shots');
    const thumbs = document.getElementById('thumbs');
    const oom = document.getElementById('oom');
    const player = document.getElementById('player');
    const download = document.getElementById('download');

    const stageMap = {
      scenario: 's-scenario',
      frames: 's-frames',
      video: 's-video',
      assembly: 's-assembly',
      done: 's-assembly'
    };

    let pollTimer = null;
    let currentJob = null;
    const durationOptions = [10, 20, 30, 60];

    function updateDurationUi() {
      const duration = durationOptions[Number(durationEl.value)] || 10;
      const keyframes = duration + 1;
      const estMinutes = (keyframes - 1) * 18;
      durationVal.textContent = `${duration}s`;
      durationInfo.textContent = `Klatek kluczowych: ${keyframes} | Szacowany czas: ${estMinutes} minut`;
    }
    durationEl.oninput = updateDurationUi;
    stepsEl.oninput = () => stepsVal.textContent = stepsEl.value;
    updateDurationUi();

    function setStage(stage) {
      ['s-scenario','s-frames','s-video','s-assembly'].forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      const key = stageMap[stage];
      if (key) document.getElementById(key).classList.add('active');
    }

    function renderShotList(list) {
      shots.innerHTML = '';
      (list || []).forEach(item => {
        const card = document.createElement('div');
        card.className = 'shot';
        card.innerHTML = `<strong>#${item.frame_number ?? '?'}</strong><div class="muted">${item.camera_angle ?? ''}</div><p>${item.description ?? ''}</p>`;
        shots.appendChild(card);
      });
    }

    function renderFrames(paths) {
      thumbs.innerHTML = '';
      (paths || []).forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'thumb';
        card.innerHTML = `<div class="muted">Klatka ${i + 1}</div><img src="${p}" alt="frame ${i + 1}" onerror="this.style.display='none'"/>`;
        thumbs.appendChild(card);
      });
    }

    async function pollStatus() {
      if (!currentJob) return;
      const res = await fetch(`/status/${currentJob}`);
      if (!res.ok) return;
      const s = await res.json();

      setStage(s.stage);
      bar.style.width = `${s.progress || 0}%`;
      statusText.textContent = s.message || '';

      const data = s.data || {};
      if (data.shot_list) renderShotList(data.shot_list);
      if (data.frame_paths) renderFrames(data.frame_paths);

      if (s.stage === 'error') {
        runBtn.disabled = false;
        if ((s.message || '').includes('OOM')) oom.style.display = 'block';
        if (pollTimer) clearInterval(pollTimer);
      }

      if (s.stage === 'done') {
        runBtn.disabled = false;
        if (pollTimer) clearInterval(pollTimer);
        const outUrl = `/output/${currentJob}`;
        player.src = outUrl;
        player.style.display = 'block';
        download.href = outUrl;
        download.style.display = 'inline-block';
      }
    }

    runBtn.onclick = async () => {
      const prompt = promptEl.value.trim();
      if (!prompt) {
        alert('Wpisz opis sceny.');
        return;
      }

      runBtn.disabled = true;
      oom.style.display = 'none';
      shots.innerHTML = '';
      thumbs.innerHTML = '';
      player.style.display = 'none';
      download.style.display = 'none';
      bar.style.width = '0%';
      statusText.textContent = 'Uruchamiam job...';

      const [w, h] = resEl.value.split('x').map(Number);
      const duration = durationOptions[Number(durationEl.value)] || 10;
      const payload = {
        prompt,
        duration,
        width: w,
        height: h,
        steps: Number(stepsEl.value)
      };

      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        runBtn.disabled = false;
        statusText.textContent = 'Blad startu joba.';
        return;
      }

      const json = await res.json();
      currentJob = json.job_id;
      if (pollTimer) clearInterval(pollTimer);
      await pollStatus();
      pollTimer = setInterval(pollStatus, 2000);
    };
  </script>
</body>
</html>
